services:
  web:
    build: .
    image: onlytwo:latest
    container_name: onlytwo-web
    expose:
      - "8080"
    environment:
      - ONLYTWO_ADDR=:8080
      - ONLYTWO_ALLOWED_ORIGINS=https://${ONLYTWO_DOMAIN:?ONLYTWO_DOMAIN missing}
      - ONLYTWO_TRUSTED_PROXIES=${ONLYTWO_TRUSTED_PROXIES:-}
    networks:
      - onlytwo-net
      - proxy
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onlytwo.rule=Host(`${ONLYTWO_DOMAIN:?ONLYTWO_DOMAIN missing}`)"
      - "traefik.http.routers.onlytwo.entrypoints=websecure"
      - "traefik.http.routers.onlytwo.tls.certresolver=le"
      - "traefik.http.services.onlytwo.loadbalancer.server.port=8080"
      - "traefik.http.routers.onlytwo.middlewares=security-headers@file,compression@file,rate-limit@file"

networks:
  onlytwo-net:
    driver: bridge
  proxy:
    external: true